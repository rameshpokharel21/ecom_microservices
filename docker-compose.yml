services:
  postgres:
    container_name: ecom_postgres
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - ecom-network

    restart: unless-stopped

  mongodb:
    container_name: ecom_mongodb
    image: mongodb/mongodb-community-server:8.0-ubi8
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ecom-network
    restart: unless-stopped

  # Product service
  product-service:
    build:
      context: ./product

    container_name: ecom_product

    ports:
      - "${PRODUCT_PORT}:8081"
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PRODUCT_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    networks:
      - ecom-network
    restart: unless-stopped

  # User service
  user-service:
    build:
      context: ./user

    container_name: ecom_user

    ports:
      - "${USER_PORT}:8082"
    depends_on:
      mongodb:
        condition: service_healthy

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@ecom_mongodb:27017/${USER_DB}?authSource=admin
      TEST_VAR: hello_from_docker

    networks:
      - ecom-network
    restart: unless-stopped

  # Order service
  order-service:
    build:
      context: ./order

    container_name: ecom_order

    ports:
      - "${ORDER_PORT}:8083"
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ORDER_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    networks:
      - ecom-network

    restart: unless-stopped

  pgadmin:
    container_name: ecom_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin/data
    ports:
      - "5050:80"
    networks:
      - ecom-network
    restart: unless-stopped

networks:
  ecom-network:
    driver: bridge
volumes:
  postgres_data:
  mongo_data:
  pgadmin_data: